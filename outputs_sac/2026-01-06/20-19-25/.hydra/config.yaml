exp_name: rl-humanoid
seed: 42
resume_from: null
paths:
  log_root: null
vecnorm:
  enabled: true
  clip_obs: 10.0
  gamma: 0.99
  epsilon: 1.0e-08
env:
  name: Humanoid-v5
  make_kwargs:
    render_mode: null
  vec_env:
    n_envs: 8
    start_method: spawn
    monitor: true
algo:
  policy: MlpPolicy
  device: cuda
  policy_kwargs:
    net_arch:
      pi:
      - 256
      - 256
      qf:
      - 256
      - 256
  hyperparams:
    learning_rate: 0.0003
    buffer_size: 1000000
    learning_starts: 10000
    batch_size: 256
    tau: 0.005
    gamma: 0.99
    ent_coef: auto
    train_freq: 1
    gradient_steps: 1
    target_update_interval: 1
    use_sde: false
    use_sde_at_warmup: false
training:
  total_timesteps: 10000000
  log_interval: 10
  checkpoint_every_steps: 250000
